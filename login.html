<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Issues Tracker - Login</title>
</head>

<body>
    <div class="page-wrapper">
        <div class="login-card">

            <div class="logo-wrap">
                <img class="github-logo" src="assets/logo.png" alt="GitHub Issues Tracker Logo">
            </div>

            <h1 class="login-title">GitHub Issues Tracker</h1>
            <p class="login-subtitle">Sign in to manage your issues</p>

            <div class="error-msg hidden" id="error-msg">Invalid username or password</div>

            <div class="form-group">
                <label class="form-label">Username</label>
                <input type="text" class="form-input" id="username-input" placeholder="Enter Username">
                <p class="input-hint">Default: admin</p>
            </div>

            <div class="form-group">
                <label class="form-label">Password</label>
                <input type="password" class="form-input" id="password-input" placeholder="Enter Password">
                <p class="input-hint">Default: admin123</p>
            </div>

            <button class="signin-btn" onclick="handleLogin()">Sign In</button>

            <div class="divider">
                <span>OR</span>
            </div>

            <p class="demo-label">Demo Credentials:</p>
            <div class="demo-box">
                <p><strong>Username:</strong> admin</p>
                <p><strong>Password:</strong> admin123</p>
            </div>

        </div>
    </div>

</body>

</html>
